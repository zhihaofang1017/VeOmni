# # Tests layout

name: GPU unit tests

on:
  # Trigger the workflow on push or pull request,
  # but only for the main branch
  push:
    branches:
      - main
      - v0.*
    paths:
      - "**/*.py"
      - "!scripts/**/*.py"
      - .github/workflows/gpu_unit_tests.yml
      - "pyproject.toml"
      - "uv.lock"
  pull_request:
    branches:
      - main
    paths:
      - "**/*.py"
      - "!scripts/**/*.py"
      - .github/workflows/gpu_unit_tests.yml
      - "pyproject.toml"
      - "uv.lock"

# Cancel jobs on the same ref if a new one is triggered
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

# Declare permissions just read content.
permissions:
  contents: read

env:
  IMAGE: "verl-ci-cn-beijing.cr.volces.com/veomni/open_veomni-gpu:pytorch_25_03_py3_cuda12_9"
  NCCL_DEBUG: "WARN"
  # uv's default 30s timeout is too short for the ~617 MiB
  # nvidia-cudnn-cu12 wheel on the CN runners; bump to 5 min so a
  # transient slow link doesn't fail the whole sync.
  UV_HTTP_TIMEOUT: "300"
  # qwen3_5's full 248K vocab embedding fragments the PyTorch allocator
  # on the L20 (9+ GiB ends up reserved-but-unallocated, OOMing the
  # next 2.4 GiB request). Expandable segments coalesce the free
  # blocks so the toy training fits the 44 GiB card.
  PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"
  # Disable UCX's signal-handler chain. NCCL's RDMA plugin pulls in
  # libucs, which registers a SIGSEGV handler that itself segfaults
  # via libnvidia-ptxjitcompiler.so.1 when a rank tears down its
  # CUDA context (observed on test_trainer_saveload[*-8] after all
  # weight checks pass; rank exits with -11 and torchrun reports the
  # whole job failed even though the test logic completed).
  UCX_HANDLE_ERRORS: "none"

jobs:
  lint:
    uses: ./.github/workflows/check_pr_lint.yml

  gpu_unit_tests_v5:
    if: github.repository_owner == 'ByteDance-Seed'
    needs: lint
    # Self-hosted L20-8 fleet managed by github_runner/ (ansible). Any free
    # `l20-8` runner is picked; use `[self-hosted, l20-N]` to pin to a specific
    # box. See github_runner/README.md for the full label scheme.
    runs-on: [self-hosted, l20-8]
    # 120m budget covers the combined suite (parallel/ulysses, data, ops,
    # fsdp utils, checkpoint callback, etc.).
    timeout-minutes: 120
    container:
      image: verl-ci-cn-beijing.cr.volces.com/veomni/open_veomni-gpu:pytorch_25_03_py3_cuda12_9
      volumes:
        - /mnt/veomni_ci:/mnt/veomni_ci:ro
      options: >-
        --gpus all
        --ipc host
        --shm-size 32g
    env:
      NO_PROXY: "localhost,127.0.0.1,hf-mirror.com"
      HF_ENDPOINT: "https://hf-mirror.com"
      HF_HUB_ENABLE_HF_TRANSFER: "0"
      NCCL_DEBUG: "WARN"
      CI_HF_MODELS_DIR: "/mnt/veomni_ci/models"
      CI_SAMPLES_DIR: "/mnt/veomni_ci/datasets/custom_data/samples"
      CI_DATASET_DIR: "/mnt/veomni_ci/datasets"

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - name: Free shared L20 GPU
        # Some prior CI runs on this physical host leak Python/torchrun
        # processes that keep tens of GiB pinned on the GPUs even after
        # their sibling container exits. Without this kill step the next
        # job lands on the same physical host and OOMs at the first
        # large allocation. Safe here because the L20-8 self-hosted
        # runners are 1-job-per-physical-host and ``--gpus all`` already
        # claims the whole card.
        run: |
          nvidia-smi || true
          pids=$(nvidia-smi --query-compute-apps=pid --format=csv,noheader,nounits 2>/dev/null | sort -u | tr '\n' ' ')
          if [ -n "$pids" ]; then
            echo "Killing stale GPU processes: $pids"
            kill -9 $pids 2>/dev/null || true
            sleep 3
            nvidia-smi || true
          fi
      - name: Detect changed paths for conditional tests
        id: changes
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha || github.event.before || 'HEAD~1' }}"
          CHANGED=$(git diff --name-only "$BASE_SHA" HEAD -- || true)
          if echo "$CHANGED" | grep -qE '(veomni/distributed/sequence_parallel/|veomni/models/transformers/qwen3_5/)'; then
            echo "qwen3_5_ulysses=true" >> "$GITHUB_OUTPUT"
          else
            echo "qwen3_5_ulysses=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Sync dependencies
        run: |
          uv sync --frozen --extra gpu --extra audio --group dev
      - name: Run parallel tests
        # TODO: run all tests under tests/parallel/ulysses after we verify
        #       tests/parallel/ulysses/test_ulysses_async.py still works
        run: |
          uv run --frozen pytest -s -x tests/parallel/ulysses/test_ulysses.py
          uv run --frozen pytest -s -x tests/parallel/ulysses/test_all_gather.py
          uv run --frozen pytest -s -x tests/parallel/ulysses/test_slice_input_tensor.py
          uv run --frozen pytest -s -x tests/parallel/encoder_data_balance/test_balance_reverse.py
          uv run --frozen pytest -s -x tests/parallel/encoder_data_balance/test_balance_sorting_algo.py
      - name: Run models tests
        run: |
          uv run --frozen pytest -s -x tests/models/test_model_registry.py
          uv run --frozen pytest -s -x tests/models/test_models_patch.py
          uv run --frozen pytest -s -x tests/models/test_vlm_trainer.py
          uv run --frozen pytest -s -x tests/models/test_padded_packed_loss.py
          uv run --frozen pytest -s -x tests/models/test_models_logits_equal_v5.py
          uv run --frozen pytest -s -x tests/models/test_model_forward_no_implicit_sync.py
          uv run --frozen pytest -s -x tests/models/test_checkpoint_tensor_converter.py
          uv run --frozen pytest -s -x tests/models/test_return_log_probs_e2e.py
      - name: Run Qwen3.5 GatedDeltaNet Ulysses SP tests
        if: steps.changes.outputs.qwen3_5_ulysses == 'true'
        run: |
          uv run --frozen pytest -s -x tests/parallel/ulysses/test_qwen3_5_gated_deltanet_ulysses.py
      - name: Run fsdp2/extra_parallel+fsdp2 clip grad norm test
        run: |
          uv run --frozen pytest -s -x tests/utils/test_extra_parallel_clip_grad_norm.py
      - name: Run fsdp2 all ranks or rank0 load model weights
        run: |
          uv run --frozen pytest -s -x tests/utils/test_rank0_load_and_broadcast_weights.py
      - name: Run checkpoint callback unit tests
        run: |
          uv run --frozen pytest -s -x tests/checkpoints/test_checkpoint_callback.py
      - name: Run e2e dcp save and load test
        run: |
          uv run --frozen pytest -s -x tests/checkpoints/test_trainer_saveload.py
      - name: Run distributed tests (dummy_forward)
        run: |
          uv run --frozen pytest -s -x tests/distributed/test_dummy_forward.py
      - name: Run data tests
        run: |
          uv run --frozen pytest -s -x tests/data
      - name: Run ops tests
        run: |
          uv run --frozen pytest -s -x tests/ops
      - name: Run utils tests
        # TODO: run all tests under tests/utils/ once all util tests are verified
        run: |
          uv run --frozen pytest -s -x tests/utils/test_count_flops.py
      - name: Run Muon optimizer tests
        run: |
          uv run --frozen pytest -s -x tests/optim/test_muon_unit.py
          uv run --frozen pytest -s -x tests/optim/test_muon_fsdp2_parity.py
          uv run --frozen pytest -s -x tests/optim/test_muon_fsdp2_smoke.py
      - name: Install LoRA extra
        run: |
          uv sync --frozen --extra gpu --extra audio --extra lora --group dev
      - name: Run LoRA e2e test
        run: |
          uv run --frozen pytest -s -x tests/lora/test_lora_trainer_saveload.py
