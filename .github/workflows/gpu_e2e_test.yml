# # Tests layout

name: GPU e2e tests

on:
  # Trigger the workflow on push or pull request,
  # but only for the main branch
  push:
    branches:
      - main
      - v0.*
    paths:
      - "**/*.py"
      - "!scripts/**/*.py"
      - .github/workflows/gpu_e2e_test.yml
      - "pyproject.toml"
      - "uv.lock"
  pull_request:
    branches:
      - main
    paths:
      - "**/*.py"
      - "!scripts/**/*.py"
      - .github/workflows/gpu_e2e_test.yml
      - "pyproject.toml"
      - "uv.lock"

# Cancel jobs on the same ref if a new one is triggered
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

# Declare permissions just read content.
permissions:
  contents: read

env:
  IMAGE: "verl-ci-cn-beijing.cr.volces.com/veomni/open_veomni-gpu:v0.1.11_cu130"
  NCCL_DEBUG: "WARN"
  # uv's default 30s timeout is too short for the large ~600 MiB
  # nvidia-cudnn-cu13 wheel on the CN runners; bump to 5 min so a
  # transient slow link doesn't fail the whole sync.
  UV_HTTP_TIMEOUT: "300"
  # qwen3_5's full 248K vocab embedding fragments the PyTorch allocator
  # on the L20 (9+ GiB ends up reserved-but-unallocated, OOMing the
  # next 2.4 GiB request). Expandable segments coalesce the free
  # blocks so the toy e2e fits the 44 GiB card.
  PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"
  # Disable UCX's signal-handler chain — see gpu_unit_tests.yml for
  # rationale (NCCL's RDMA plugin pulls in libucs, whose SIGSEGV
  # handler trips libnvidia-ptxjitcompiler.so.1 on rank teardown).
  UCX_HANDLE_ERRORS: "none"

jobs:
  lint:
    uses: ./.github/workflows/check_pr_lint.yml

  gpu_e2e_tests_v5:
    if: github.repository_owner == 'ByteDance-Seed'
    needs: lint
    # Self-hosted L20-8 fleet managed by github_runner/ (ansible).
    runs-on: [self-hosted, l20-8]
    # 120m budget fits the e2e suite plus the diffusers e2e step.
    timeout-minutes: 120
    container:
      image: verl-ci-cn-beijing.cr.volces.com/veomni/open_veomni-gpu:v0.1.11_cu130
      volumes:
        - /mnt/veomni_ci:/mnt/veomni_ci:ro
      options: >-
        --gpus all
        --ipc host
        --shm-size 32g
    env:
      NO_PROXY: "localhost,127.0.0.1,hf-mirror.com"
      HF_ENDPOINT: "https://hf-mirror.com"
      HF_HUB_ENABLE_HF_TRANSFER: "0"
      NCCL_DEBUG: "WARN"
      CI_HF_MODELS_DIR: "/mnt/veomni_ci/models"
      CI_SAMPLES_DIR: "/mnt/veomni_ci/datasets/custom_data/samples"
      CI_DATASET_DIR: "/mnt/veomni_ci/datasets"

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - name: Free shared L20 GPU
        # Some prior CI runs on this physical host leak Python/torchrun
        # processes that keep tens of GiB pinned on the GPUs even after
        # their sibling container exits. Safe here: L20-8 self-hosted
        # runners are 1-job-per-physical-host and ``--gpus all`` claims
        # the whole card.
        run: |
          nvidia-smi || true
          pids=$(nvidia-smi --query-compute-apps=pid --format=csv,noheader,nounits 2>/dev/null | sort -u | tr '\n' ' ')
          if [ -n "$pids" ]; then
            echo "Killing stale GPU processes: $pids"
            kill -9 $pids 2>/dev/null || true
            sleep 3
            nvidia-smi || true
          fi
      - name: Sync dependencies
        run: |
          uv sync --frozen --extra gpu --group dev
      - name: Run e2e tests
        run: |
          uv run --frozen pytest -s -x tests/e2e/test_e2e_parallel.py
      - name: Free GPUs between test steps
        # pytest's mp.spawn / torchrun workers sometimes outlive the pytest
        # session — they hold tens of GiB on GPU 0 and OOM the next test.
        # Sweep again between test steps; the job-start cleanup alone
        # isn't enough.
        if: always()
        run: |
          nvidia-smi || true
          pids=$(nvidia-smi --query-compute-apps=pid --format=csv,noheader,nounits 2>/dev/null | sort -u | tr '\n' ' ')
          if [ -n "$pids" ]; then
            echo "Killing stale GPU processes: $pids"
            kill -9 $pids 2>/dev/null || true
            sleep 3
            nvidia-smi || true
          fi
      - name: Run FSDP equivalence tests
        run: |
          uv run --frozen pytest -s -x tests/distributed/test_fsdp_equivalence.py
      - name: Run diffusers tests
        # diffusers + ftfy + torchcodec ship under the `gpu` extra (rolled in
        # from the dropped `dit` extra), so no extra sync step is needed.
        run: |
          uv run --frozen pytest -s -x tests/e2e/test_e2e_parallel.py::test_wan_dit_parallel_align
