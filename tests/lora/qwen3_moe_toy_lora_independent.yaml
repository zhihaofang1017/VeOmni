# Trainer-shaped LoRA config for the Qwen3-MoE toy -- Mode 1 (independent
# per-expert LoRA). Consumed by:
#
#   * tests/lora/test_moe_lora_trainer.py     (save -> DCP-resume ->
#       adapter-resume round-trip; writer + both resumer subprocesses
#       share this yaml.)
#   * tests/lora/test_moe_lora_ep2.py         (EP=2 trainer integration
#       + EP=2 save / cross-EP adapter resume / EP=2 DCP round-trip
#       parallel alignment; all subprocesses override
#       ``moe_implementation`` to fused_triton via CLI to engage the
#       EP-aware MoE-LoRA dispatch.)
#
# Step counts are intentionally just large enough that an intermediate
# checkpoint exists *and* the trainer continues past it; this lets the
# resume test verify the resumed run actually picks up where the writer
# left off rather than starting fresh. Mirrors the user-facing
# ``configs/text/qwen3_moe_lora.yaml``; the companion
# ``qwen3_moe_toy_lora_shared.yaml`` differs only in
# ``share_expert_lora: true`` (VeOmni's argument parser treats
# ``lora_config`` as an opaque dict, so we ship one yaml per mode).
model:
  config_path: tests/toy_config/qwen3_moe_toy/config.json
  ops_implementation:
    attn_implementation: flash_attention_2
    moe_implementation: eager
    cross_entropy_loss_implementation: eager
    rms_norm_implementation: eager
    swiglu_mlp_implementation: eager
    rotary_pos_emb_implementation: eager
  lora_config:
    rank: 8
    alpha: 16
    use_rslora: false
    lora_modules:
      - q_proj
      - v_proj
    target_parameters:
      - model.layers.*.mlp.experts.gate_up_proj
      - model.layers.*.mlp.experts.down_proj
    share_expert_lora: false

data:
  train_path: dummy
  max_seq_len: 128

train:
  seed: 42
  accelerator:
    fsdp_config:
      fsdp_mode: fsdp2
  init_device: meta
  global_batch_size: 4
  micro_batch_size: 1
  max_steps: 4
  checkpoint:
    output_dir: /tmp/test_moe_lora_saveload
    save_steps: 2
    save_hf_weights: true
    hf_save_steps: 2
    manager: dcp
