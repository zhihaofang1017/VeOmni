model:
  model_path: qwen2vl-7b-foundation
  input_encoder: encoder
  output_encoder: encoder
  encoders:
    image:
      model_path: qwen2-vision-model
      add_projector: false

data:
  dataloader:
    type: native
  datasets_type: iterable
  train_path: sharegpt4v_pretrain
  data_type: conversation
  chat_template: qwen2vl
  max_seq_len: 8192

train:
  accelerator:
    fsdp_config:
      fsdp_mode: fsdp2
  optimizer:
    lr: 1.0e-5
    lr_decay_style: cosine
  num_train_epochs: 3
  micro_batch_size: 2
  global_batch_size: 64
  freeze_encoder: true
  checkpoint:
    output_dir: omni_sft
    manager: dcp
