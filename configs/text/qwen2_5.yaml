model:
  model_path: Qwen/Qwen2.5-7B-Instruct
  ops_implementation:
    attn_implementation: flash_attention_2

data:
  train_path: fineweb
  train_size: 1000000000000
  dataloader:
    type: native
    drop_last: true
  datasets_type: iterable
  data_type: plaintext
  max_seq_len: 8192
  text_keys: text
  dyn_bsz_buffer_size: 200

train:
  accelerator:
    ulysses_size: 1
    fsdp_config:
      fsdp_mode: fsdp2
      mixed_precision:
        enable: true
    offload:
      enable_activation: false
  gradient_checkpointing:
    enable: true
  global_batch_size: 32
  micro_batch_size: 1
  bsz_warmup_ratio: 0.007
  optimizer:
    type: adamw
    lr: 3.0e-4
    lr_warmup_ratio: 0.007
    lr_decay_style: constant
    lr_decay_ratio: 1.0
    weight_decay: 0.01
    max_grad_norm: 1.0
  init_device: meta
  enable_full_determinism: false
  empty_cache_steps: 500
  checkpoint:
    output_dir: Qwen2.5-7B-Instruct_CT
    manager: dcp
    save_steps: 100
    save_hf_weights: true
  wandb:
    project: Qwen2.5-7B-Instruct
    name: Qwen2.5-7B-Instruct-CT
