# Sample Qwen3-MoE-30B-A3B SFT config using Muon with FSDP2 + EP.
# Muon support is transformers v5-only in VeOmni.
# Muon handles 2D hidden weights and 3D expert stacks; AdamW handles
# embeddings, lm_head, norms and biases.

model:
  model_path: Qwen3-30B-A3B-merge
  ops_implementation:
    attn_implementation: flash_attention_2
    moe_implementation: fused_triton

data:
  train_path: tulu-3-sft-mixture
  data_type: conversation
  chat_template: chatml
  max_seq_len: 2048
  train_size: 20000000
  text_keys: messages
  dyn_bsz_buffer_size: 200

train:
  accelerator:
    ulysses_size: 1
    ep_size: 8
    fsdp_config:
      fsdp_mode: fsdp2
      mixed_precision:
        enable: true
    offload:
      enable_activation: false
  gradient_checkpointing:
    enable: true
  global_batch_size: 8
  micro_batch_size: 1
  bsz_warmup_ratio: 0.007
  optimizer:
    type: muon
    lr: 1.0e-4
    weight_decay: 0.1
    lr_decay_style: cosine
    max_grad_norm: 1.0
    # Moonlight Muon (`match_rms_adamw`) aligns the update RMS with AdamW,
    # so the Muon group reuses the AdamW lr / weight_decay.
    muon_lr: 1.0e-4
    muon_momentum: 0.95
    muon_nesterov: true
    muon_weight_decay: 0.1
    muon_ns_steps: 5
    muon_adjust_lr_fn: match_rms_adamw
    # Requires (num_experts / ep_size) % ep_fsdp_size == 0; otherwise falls back.
    muon_expert_zero_comm: true
  num_train_epochs: 1
  init_device: meta
  enable_full_determinism: false
  empty_cache_steps: 500
  checkpoint:
    output_dir: Qwen3-30B-A3B-sft-tulu-muon
    manager: dcp
    save_steps: 100
    save_epochs: 1
    save_hf_weights: true
  wandb:
    project: VeOmni
    name: Qwen3-30B-A3B-sft-tulu-muon
