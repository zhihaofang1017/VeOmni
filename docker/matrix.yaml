# Matrix consumed by docker/generate.py to render docker/cuda/Dockerfile.* and
# docker/ascend/Dockerfile.* from docker/templates/*.j2. The pip-based
# *_a2.arm / *_a3 ascend variants are hand-maintained and not in this matrix.
# Edit -> `python docker/generate.py` -> commit both this file and the regen.

# Each image picks one preset via `uv_extras_preset:`. gpu/npu/npu_aarch64
# are mutually exclusive (see [tool.uv].conflicts in pyproject.toml), so we
# can't `--all-extras`.
uv_extras_presets:
  cuda:
    - gpu
  ascend_x86:
    - npu
  ascend_arm:
    - npu_aarch64

defaults:
  # Concrete pin (not the pyproject range) — must stay inside required-version.
  uv_version: "0.11.16"

  # Exposed as ARG APT_SOURCE / ARG PIP_INDEX so users can swap mirrors at
  # `docker build` time without regenerating.
  apt_source: "http://archive.ubuntu.com/ubuntu/"
  pip_index: "https://pypi.org/simple"
  python_dist_packages: "/usr/local/lib/python3.12/dist-packages/"
  workdir: "/app"

  uv_dev: true

images:
  # NGC 25.11 ships torch 2.10.0a0; uv override-dependencies upgrades to
  # 2.11.0+cu130 (fixes the 2.9.1 conv3d cuDNN regression that cu129 worked
  # around with nvidia-cudnn-cu12).
  - name: cu130
    output: docker/cuda/Dockerfile.cu130
    template: cuda.Dockerfile.j2
    base_image: "nvcr.io/nvidia/pytorch:25.11-py3"
    release_notes_url: "https://docs.nvidia.com/deeplearning/frameworks/pytorch-release-notes/rel-25-11.html"
    uv_extras_preset: cuda

  # uv_extra_flags allow github / pythonhosted under --locked (CANN base has
  # stricter cert handling); see build_uv_sync_command in generate.py.
  - name: ascend_8.3.rc2_a2.x86
    output: docker/ascend/Dockerfile.ascend_8.3.rc2_a2.x86
    template: ascend.Dockerfile.j2
    base_image: "swr.cn-south-1.myhuaweicloud.com/ascendhub/cann:8.3.rc2-910b-ubuntu22.04-py3.11"
    # CANN base ships Python 3.11.13; bump if Huawei rolls a new patch.
    python_dist_packages: "/usr/local/python3.11.13/lib/python3.11/site-packages/"
    header_comments:
      - "docker hub: https://hub.docker.com/layers/ascendai/cann/8.3.rc2-910b-ubuntu22.04-py3.11/images/sha256-9efee6a0bb1e8cb6d5dd5170a4a51837d3783e79e2c57c6f4cb5b9ed58598e3e"
      - "cann web: https://www.hiascend.com/developer/ascendhub/detail/17da20d1c2b6493cb38765adeba85884"
      - "git repo: https://gitcode.com/Ascend/pytorch"
    uv_extras_preset: ascend_x86
    uv_extra_flags:
      - "--allow-insecure-host github.com"
      - "--allow-insecure-host pythonhosted.org"
